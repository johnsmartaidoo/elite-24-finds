<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite 24 Finds - Today's Best Amazon Deals</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>🏆 Elite 24 Finds</h1>
                <p>Discover Today's Best Amazon Deals</p>
                <a href="admin.html" class="admin-link" style="position: absolute; top: 10px; right: 10px; color: white; text-decoration: none; font-size: 14px; background: rgba(0,0,0,0.3); padding: 8px 12px; border-radius: 5px; transition: background 0.3s;" onmouseover="this.style.background='rgba(0,0,0,0.5)'" onmouseout="this.style.background='rgba(0,0,0,0.3)'">⚙️ Admin</a>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search products...">
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="home">Home</option>
                    <option value="electronics">Electronics</option>
                    <option value="fashion">Fashion</option>
                    <option value="sports">Sports</option>
                    <option value="kitchen">Kitchen</option>
                    <option value="books">Books</option>
                    <option value="toys">Toys</option>
                    <option value="beauty">Beauty</option>
                    <option value="health">Health</option>
                    <option value="garden">Garden</option>
                    <option value="automotive">Automotive</option>
                    <option value="office">Office</option>
                    <option value="pets">Pets</option>
                    <option value="music">Music</option>
                    <option value="cameras">Cameras</option>
                    <option value="travel">Travel</option>
                    <option value="baby">Baby</option>
                    <option value="tools">Tools</option>
                    <option value="furniture">Furniture</option>
                    <option value="decor">Decor</option>
                </select>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="info-banner">
            <p>✨ Last updated: <span id="lastUpdated">Loading...</span></p>
        </section>

        <section class="products-grid" id="productsGrid">
            <div class="loading">Loading products...</div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Elite 24 Finds. All affiliate links help support this site.</p>
            <p>Disclaimer: We earn a commission from Amazon purchases made through our affiliate links.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
