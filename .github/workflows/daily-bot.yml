name: Daily Bot - Update Products & Post to Pinterest

on:
  schedule:
    # Run every day at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  update-products:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Elite 24 Finds Bot
        env:
          AMAZON_ASSOCIATE_ID: ${{ secrets.AMAZON_ASSOCIATE_ID }}
          AMAZON_API_KEY: ${{ secrets.AMAZON_API_KEY }}
          AMAZON_API_SECRET: ${{ secrets.AMAZON_API_SECRET }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_ACCOUNT_ID: ${{ secrets.PINTEREST_ACCOUNT_ID }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
        run: npm run bot

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Elite 24 Finds Bot"
          git add products.json
          git commit -m "🤖 Daily update: Products and deals refreshed" || echo "No changes to commit"
          git push

      - name: Send notification
        if: always()
        run: |
          echo "✅ Bot execution completed"
          echo "📊 Products updated and posted to Pinterest"
